<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — To-Do’s</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#fbe4e6,#f6cfd2);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  background:rgba(255,255,255,0.92);
  width:380px;
  padding:35px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.08);
  text-align:center;
}

.brand{
  font-family:'Pacifico',cursive;
  font-size:2rem;
  margin-bottom:6px;
}

.tagline{
  font-size:.85rem;
  color:#7a5a5a;
  margin-bottom:24px;
}

input{
  width:100%;
  padding:12px 14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid #e6caca;
  font-size:.9rem;
}

input:focus{
  outline:none;
  border-color:#b05c5c;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:14px;
  background:#b05c5c;
  color:white;
  font-size:.95rem;
  cursor:pointer;
  margin-top:6px;
}

button:hover{
  opacity:.9;
}

.link{
  margin-top:18px;
  font-size:.85rem;
}

.link a{
  color:#b05c5c;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>

<body>

<div class="card">
  <div class="brand">To-Do’s</div>
  <div class="tagline">Create your calm workspace</div>

  <form id="signup-form">
    <input type="text" name="name" placeholder="Full name">
    <input type="email" name="email" required placeholder="Email address">
    <input type="password" name="password" required placeholder="Password">
    <button type="submit">Create account</button>
  </form>


  <div class="link">
    Already have an account?
    <a href="login.html">Login</a>
  </div>
</div>
 
<script>
document.getElementById("signup-form").addEventListener("submit", async (e)=>{
e.preventDefault()

const form = new FormData(e.target)

const data = {
 name: form.get("name"),
 email: form.get("email"),
 password: form.get("password")
}

const res = await fetch("https://todo-backend-lotq.onrender.com/api/auth/signup",{
 method:"POST",
 headers:{"Content-Type":"application/json"},
 body:JSON.stringify(data)
})

const result = await res.json()

console.log(result)

alert("Account created successfully")

window.location="login.html"
})
</script>

</body>
</html>
